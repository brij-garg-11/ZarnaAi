<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Zarna HQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0C0A08; color: #F0EAE0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .gold-input { background: #1A1714; border: 1px solid #2D2825; color: #F0EAE0; border-radius: 8px; padding: 12px 16px; width: 100%; font-size: 15px; transition: border-color 0.15s; }
    .gold-input:focus { outline: none; border-color: #C9A84C; }
    .gold-input::placeholder { color: #6A6058; }
    .btn-gold { background: linear-gradient(135deg, #C9A84C 0%, #d9b850 100%); color: #0C0A08; font-weight: 700; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; cursor: pointer; width: 100%; transition: opacity 0.15s; }
    .btn-gold:hover { opacity: 0.9; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl font-black mx-auto mb-4"
           style="background: linear-gradient(135deg, #C9A84C, #e8c05a); color: #0C0A08;">Z</div>
      <h1 class="text-2xl font-bold" style="color:#F0EAE0;">Zarna HQ</h1>
      <p class="text-sm mt-1" style="color:#6A6058;">Operator Dashboard</p>
    </div>

    <!-- Card -->
    <div style="background:#161412; border:1px solid #2D2825; border-radius:16px; padding:32px;">
      <h2 class="text-lg font-semibold mb-6" style="color:#F0EAE0;">Sign in</h2>

      {% if error %}
      <div style="background:#450a0a; border:1px solid #991b1b; color:#fca5a5; border-radius:8px; padding:12px 14px; font-size:14px; margin-bottom:20px;">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest mb-2" style="color:#6A6058;">Email</label>
          <input type="email" name="email" class="gold-input" placeholder="you@example.com" autocomplete="email" required autofocus>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest mb-2" style="color:#6A6058;">Password</label>
          <input type="password" name="password" class="gold-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-gold mt-2">Sign in →</button>
      </form>
    </div>

    <p class="text-center text-xs mt-6" style="color:#3D3630;">
      Authorized personnel only · <a href="mailto:brij@zarnagarg.com" style="color:#8A7035;">Contact Brij for access</a>
    </p>
  </div>
</body>
</html>
