<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Zarna HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D0F10;
      color: #f0ebe3;
      font-family: 'DM Sans', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    /* Subtle pink glow bg */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(239,73,132,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .wrap { width: 100%; max-width: 380px; position: relative; z-index: 1; }

    /* Logo */
    .logo-ring {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #ef4984, #c6235d);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; color: white;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(239,73,132,0.35);
    }
    h1 { text-align: center; font-size: 22px; font-weight: 800; color: #f0ebe3; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 13px; color: #5e5a56; margin-bottom: 32px; }

    /* Card */
    .card {
      background: #171a1d;
      border: 1px solid #2a2e32;
      border-radius: 16px;
      padding: 30px;
    }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 22px; color: #f0ebe3; }

    label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: #5e5a56; margin-bottom: 7px; }
    .field { margin-bottom: 18px; }

    input {
      background: rgba(255,255,255,0.04);
      border: 1px solid #2a2e32;
      color: #f0ebe3;
      border-radius: 10px;
      padding: 12px 14px;
      width: 100%;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { outline: none; border-color: #ef4984; box-shadow: 0 0 0 3px rgba(239,73,132,0.12); }
    input::placeholder { color: #3e3a36; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #ef4984, #c6235d);
      color: white;
      font-weight: 800;
      font-size: 15px;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(239,73,132,0.3);
      letter-spacing: 0.01em;
    }
    .btn:hover { opacity: 0.93; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(239,73,132,0.4); }
    .btn:active { transform: translateY(0); }

    .error-box {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .footer-note { text-align: center; font-size: 12px; color: #3e3a36; margin-top: 20px; }
    .footer-note a { color: #c6235d; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-ring">Z</div>
    <h1>Zarna HQ</h1>
    <p class="sub">Operator Dashboard</p>

    <div class="card">
      <h2>Sign in</h2>

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="post">
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required autofocus>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Sign in →</button>
      </form>
    </div>

    <p class="footer-note">
      Authorized personnel only · <a href="mailto:brij@zarnagarg.com">Contact Brij for access</a>
    </p>
  </div>
</body>
</html>
