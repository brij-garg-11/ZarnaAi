<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Zarna HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #faf8f5;
      color: #1a1614;
      font-family: 'DM Sans', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 380px; }

    .logo-ring {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #ef4984, #c6235d);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; color: white;
      margin: 0 auto 16px;
      box-shadow: 0 6px 20px rgba(239,73,132,0.3);
    }
    h1 { text-align: center; font-size: 22px; font-weight: 800; color: #1a1614; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 13px; color: #a8a09a; margin-bottom: 32px; }

    .card {
      background: #ffffff;
      border: 1px solid #ede8e3;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 22px; color: #1a1614; }

    label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: #a8a09a; margin-bottom: 7px; }
    .field { margin-bottom: 18px; }

    input {
      background: #f9f6f3;
      border: 1.5px solid #ede8e3;
      color: #1a1614;
      border-radius: 10px;
      padding: 12px 14px;
      width: 100%;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { outline: none; border-color: #ef4984; background: #fff; box-shadow: 0 0 0 3px rgba(239,73,132,0.1); }
    input::placeholder { color: #c8c0b8; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #ef4984, #c6235d);
      color: white;
      font-weight: 800;
      font-size: 15px;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(239,73,132,0.28);
      letter-spacing: 0.01em;
    }
    .btn:hover { opacity: 0.93; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(239,73,132,0.38); }
    .btn:active { transform: translateY(0); }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 18px;
    }
    .footer-note { text-align: center; font-size: 12px; color: #c8c0b8; margin-top: 20px; }
    .footer-note a { color: #c6235d; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-ring">Z</div>
    <h1>Zarna HQ</h1>
    <p class="sub">Operator Dashboard</p>

    <div class="card">
      <h2>Sign in</h2>

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="post">
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required autofocus>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Sign in →</button>
      </form>
    </div>

    <p class="footer-note">
      Authorized personnel only · <a href="mailto:brij@zarnagarg.com">Contact Brij for access</a>
    </p>
  </div>
</body>
</html>
