<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup — Zarna HQ</title>
  <style>
    body { background:#0C0A08; color:#F0EAE0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:16px; }
    .card { background:#161412; border:1px solid #2D2825; border-radius:16px; padding:32px; width:100%; max-width:420px; }
    .gold-input { background:#1A1714; border:1px solid #2D2825; color:#F0EAE0; border-radius:8px; padding:11px 14px; width:100%; font-size:14px; box-sizing:border-box; transition:border-color 0.15s; }
    .gold-input:focus { outline:none; border-color:#C9A84C; }
    .btn-gold { background:linear-gradient(135deg,#C9A84C,#d9b850); color:#0C0A08; font-weight:700; border:none; border-radius:8px; padding:12px; width:100%; font-size:15px; cursor:pointer; }
    label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#6A6058; margin:14px 0 6px; }
    .error { background:#450a0a; border:1px solid #991b1b; color:#fca5a5; border-radius:8px; padding:12px; font-size:13px; margin-bottom:16px; }
    .success { background:#052e16; border:1px solid #166534; color:#4ade80; border-radius:8px; padding:16px; font-size:14px; text-align:center; }
    h1 { margin:0 0 6px; font-size:22px; }
    p { color:#6A6058; font-size:13px; margin:0 0 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,#C9A84C,#e8c05a);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#0C0A08;margin-bottom:12px;">Z</div>
      <h1>Zarna HQ Setup</h1>
      <p>Create your owner account to get started.</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if done %}
    <div class="success">
      <strong>Account created!</strong><br>
      <a href="/operator/login" style="color:#86efac;text-decoration:underline;">Sign in now →</a>
    </div>
    {% else %}
    <form method="post">
      <label>Name</label>
      <input type="text" name="name" class="gold-input" placeholder="Your name" required>
      <label>Email</label>
      <input type="email" name="email" class="gold-input" placeholder="you@example.com"
             value="{{ prefill_email }}" required>
      <label>Password</label>
      <input type="password" name="password" class="gold-input" placeholder="Min 8 characters" required>
      <label>Confirm Password</label>
      <input type="password" name="confirm" class="gold-input" placeholder="Repeat password" required>
      <div style="margin-top:24px;">
        <button type="submit" class="btn-gold">Create Owner Account →</button>
      </div>
    </form>
    {% endif %}
  </div>
</body>
</html>
