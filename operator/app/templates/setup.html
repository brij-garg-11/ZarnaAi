<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup — Zarna HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf8f5; color: #1a1614; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; -webkit-font-smoothing: antialiased; }
    .wrap { width: 100%; max-width: 420px; }
    .logo { width: 52px; height: 52px; background: linear-gradient(135deg, #ef4984, #c6235d); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: white; margin: 0 auto 14px; box-shadow: 0 5px 16px rgba(239,73,132,0.28); }
    h1 { text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 13px; color: #a8a09a; margin-bottom: 28px; }
    .card { background: #fff; border: 1px solid #ede8e3; border-radius: 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: #a8a09a; margin: 14px 0 7px; }
    label:first-of-type { margin-top: 0; }
    input { background: #f9f6f3; border: 1.5px solid #ede8e3; color: #1a1614; border-radius: 10px; padding: 11px 14px; width: 100%; font-size: 14px; font-family: inherit; transition: border-color 0.15s; }
    input:focus { outline: none; border-color: #ef4984; background: #fff; box-shadow: 0 0 0 3px rgba(239,73,132,0.1); }
    .btn { width: 100%; background: linear-gradient(135deg, #ef4984, #c6235d); color: white; font-weight: 800; font-size: 15px; font-family: inherit; border: none; border-radius: 10px; padding: 12px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 14px rgba(239,73,132,0.28); transition: opacity 0.15s; }
    .btn:hover { opacity: 0.92; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 500; margin-bottom: 16px; }
    .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; border-radius: 10px; padding: 16px; font-size: 14px; font-weight: 500; text-align: center; }
    .success a { color: #15803d; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Z</div>
    <h1>Zarna HQ Setup</h1>
    <p class="sub">Create your owner account to get started</p>
    <div class="card">
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      {% if done %}
      <div class="success"><strong>Account created!</strong><br><a href="/operator/login">Sign in now →</a></div>
      {% else %}
      <form method="post">
        <label>Name</label>
        <input type="text" name="name" placeholder="Your name" required>
        <label>Email</label>
        <input type="email" name="email" value="{{ prefill_email }}" placeholder="you@example.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 8 characters" required>
        <label>Confirm Password</label>
        <input type="password" name="confirm" placeholder="Repeat password" required>
        <button type="submit" class="btn">Create Owner Account →</button>
      </form>
      {% endif %}
    </div>
  </div>
</body>
</html>
